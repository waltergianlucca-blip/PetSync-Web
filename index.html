<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetSync 360 - Plataforma Profesional</title>
    <!-- Importamos una tipografía moderna desde Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0D9488;    /* Verde Azulado moderno */
            --primary-hover: #0F766E;
            --secondary: #F59E0B;  /* Ámbar para llamadas a la acción */
            --dark: #1E293B;       /* Gris Pizarra oscuro para texto */
            --light: #F8FAFC;      /* Fondo principal casi blanco */
            --white: #FFFFFF;
            --border: #E2E8F0;
        }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--light); 
            color: var(--dark); 
            margin: 0; 
            padding: 0; 
        }
        
        header { 
            background-color: var(--white); 
            color: var(--dark); 
            text-align: center; 
            padding: 2rem; 
            border-bottom: 1px solid var(--border);
        }
        
        h1 { margin: 0; font-size: 2.5rem; color: var(--primary); font-weight: 800; }
        .subtitle { font-size: 1.1rem; color: #64748B; margin-top: 10px; }
        
        /* Contenedor principal con Grid (Catálogo + Carrito) */
        .app-layout {
            max-width: 1400px;
            margin: 20px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 30px;
            align-items: start;
        }

        /* Controles de Búsqueda */
        .controles {
            background: var(--white);
            padding: 15px 25px;
            border-radius: 12px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        .controles select {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--border);
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            cursor: pointer;
            background-color: var(--light);
        }

        /* Grilla del Catálogo */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 20px; 
        }
        
        /* Tarjetas de Producto */
        .card { 
            background: var(--white); 
            border-radius: 12px; 
            padding: 25px; 
            border: 1px solid var(--border);
            transition: all 0.2s ease-in-out; 
            display: flex;
            flex-direction: column;
        }
        .card:hover { 
            transform: translateY(-4px); 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border-color: var(--primary);
        }
        .badge { 
            background: var(--light); 
            color: var(--primary); 
            padding: 5px 12px; 
            border-radius: 20px; 
            font-size: 0.8rem; 
            font-weight: 600; 
            align-self: flex-start;
            border: 1px solid var(--primary);
        }
        .card h3 { margin: 15px 0 10px 0; font-size: 1.2rem; }
        .price { font-size: 1.5rem; color: var(--dark); font-weight: 800; margin: 10px 0 20px 0; }
        
        /* Botones */
        .btn-group { display: flex; gap: 10px; margin-top: auto; }
        button { 
            font-family: 'Inter', sans-serif;
            border: none; 
            padding: 10px 15px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 0.95rem; 
            font-weight: 600;
            transition: all 0.2s; 
            flex: 1;
        }
        .btn-primary { background-color: var(--primary); color: var(--white); }
        .btn-primary:hover { background-color: var(--primary-hover); }
        .btn-outline { background-color: transparent; color: var(--primary); border: 2px solid var(--primary); }
        .btn-outline:hover { background-color: var(--light); }
        .btn-action { background-color: var(--secondary); color: var(--white); width: 100%; padding: 15px; margin-top: 20px;}
        .btn-action:hover { background-color: #D97706; }

        /* Panel del Carrito */
        .cart-panel {
            background: var(--white);
            border-radius: 12px;
            padding: 25px;
            border: 1px solid var(--border);
            position: sticky;
            top: 20px;
        }
        .cart-panel h2 { margin-top: 0; font-size: 1.5rem; border-bottom: 2px solid var(--light); padding-bottom: 15px; }
        .cart-items { min-height: 100px; margin-bottom: 20px; }
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid var(--light);
        }
        .cart-item h4 { margin: 0 0 5px 0; font-size: 0.95rem; }
        .cart-item p { margin: 0; color: #64748B; font-size: 0.85rem; }
        .cart-total {
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            font-weight: 800;
            margin-top: 20px;
        }

        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.6); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: var(--white); padding: 40px; border-radius: 12px; max-width: 500px; width: 90%; position: relative; }
        .close-btn { position: absolute; top: 20px; right: 25px; cursor: pointer; font-size: 1.5rem; color: #64748B; }
        
        /* Diseño responsivo para móviles */
        @media (max-width: 960px) {
            .app-layout { grid-template-columns: 1fr; }
            .cart-panel { position: relative; top: 0; }
        }
    </style>
</head>
<body>

    <header>
        <h1>🐾 PetSync 360</h1>
        <p class="subtitle">Conectando las necesidades biológicas reales de tu mascota</p>
    </header>

    <div class="app-layout">
        <!-- Columna Izquierda: Controles y Catálogo -->
        <main>
            <div class="controles">
                <label for="filtroEspecie"><strong>Filtro inteligente:</strong></label>
                <select id="filtroEspecie" onchange="renderizarCatalogo()">
                    <option value="Todos">Mostrar Todas las Mascotas</option>
                    <option value="Perro">Solo Perros 🐶</option>
                    <option value="Gato">Solo Gatos 🐱</option>
                </select>
            </div>

            <div class="grid" id="catalogo">
                <!-- Tarjetas generadas por JS -->
            </div>
        </main>

        <!-- Columna Derecha: Carrito de Compras -->
        <aside class="cart-panel">
            <h2>Tu Match (Carrito)</h2>
            <div class="cart-items" id="itemsCarrito">
                <!-- Items del carrito generados por JS -->
            </div>
            <div class="cart-total">
                <span>Total:</span>
                <span id="totalCarrito">$0.00</span>
            </div>
            <button class="btn-action" onclick="finalizarCompra()">Procesar Match Seguro</button>
        </aside>
    </div>

    <!-- Modal Detalle -->
    <div id="modalDetalle" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="cerrarModal()">&times;</span>
            <span class="badge" id="modalTipo"></span>
            <h2 id="modalTitulo" style="margin-top: 15px;"></h2>
            <p><strong>Especie recomendada:</strong> <span id="modalEspecie"></span></p>
            <p><strong>Nivel de Energía:</strong> <span id="modalEnergia"></span></p>
            <p><strong>Clave del Sistema (ID):</strong> <span id="modalId"></span></p>
            <h3 class="price" id="modalPrecio"></h3>
            <button class="btn-primary" style="width: 100%; padding: 15px;" id="btnModalAgregar">Agregar al Carrito</button>
        </div>
    </div>

    <script>
        // 1. BASE DE DATOS (Arreglo de Registros)
        const baseDeDatos = [
            { ID_Oferta: "PS-PRD-101", Tipo_Oferta: "Producto", Titulo: "Alimento NutriPersonalizado (Ansiedad)", Especie_Destino: "Perro", Nivel_Energia: "Alto", Precio: 45000.00, Stock_Cupo: 25, Disponible: true },
            { ID_Oferta: "PS-SRV-205", Tipo_Oferta: "Servicio", Titulo: "Paseo de Drenaje Energético", Especie_Destino: "Perro", Nivel_Energia: "Alto", Precio: 8500.00, Stock_Cupo: 5, Disponible: true },
            { ID_Oferta: "PS-PRD-308", Tipo_Oferta: "Producto", Titulo: "Torre Rascador Antiestrés", Especie_Destino: "Gato", Nivel_Energia: "Medio", Precio: 72000.00, Stock_Cupo: 12, Disponible: true },
            { ID_Oferta: "PS-SRV-412", Tipo_Oferta: "Servicio", Titulo: "Adiestramiento Cognitivo Básico", Especie_Destino: "Perro", Nivel_Energia: "Medio", Precio: 15000.00, Stock_Cupo: 3, Disponible: true }
        ];

        // 2. ESTADO DEL CARRITO (Arreglo dinámico)
        let carrito = [];

        // 3. RENDERIZADO DEL CATÁLOGO
        function renderizarCatalogo() {
            const contenedor = document.getElementById('catalogo');
            contenedor.innerHTML = '';
            const especieSeleccionada = document.getElementById('filtroEspecie').value;

            baseDeDatos.forEach(oferta => {
                if(oferta.Disponible && (especieSeleccionada === 'Todos' || oferta.Especie_Destino === especieSeleccionada)) {
                    const tarjeta = document.createElement('div');
                    tarjeta.className = 'card';
                    tarjeta.innerHTML = `
                        <span class="badge">${oferta.Tipo_Oferta}</span>
                        <h3>${oferta.Titulo}</h3>
                        <p style="color: #64748B; font-size: 0.9rem; margin-top: 0;">Para: <strong>${oferta.Especie_Destino}</strong></p>
                        <div class="price">$${oferta.Precio.toLocaleString('es-AR')}</div>
                        <div class="btn-group">
                            <button class="btn-outline" onclick="verDetalle('${oferta.ID_Oferta}')">Detalles</button>
                            <button class="btn-primary" onclick="agregarAlCarrito('${oferta.ID_Oferta}')">Añadir</button>
                        </div>
                    `;
                    contenedor.appendChild(tarjeta);
                }
            });
        }

        // 4. LÓGICA DEL CARRITO
        function agregarAlCarrito(idBuscado) {
            const oferta = baseDeDatos.find(item => item.ID_Oferta === idBuscado);
            if(!oferta) return;

            // Verificamos si ya está en el carrito para sumar cantidad
            const itemExistente = carrito.find(item => item.ID_Oferta === idBuscado);
            if(itemExistente) {
                itemExistente.cantidad++;
            } else {
                // Si no existe, lo agregamos al arreglo del carrito con cantidad 1
                carrito.push({
                    ID_Oferta: oferta.ID_Oferta,
                    Titulo: oferta.Titulo,
                    Precio: oferta.Precio,
                    cantidad: 1
                });
            }
            renderizarCarrito();
            cerrarModal(); // Cierra el modal si se agregó desde ahí
        }

        function renderizarCarrito() {
            const contenedorCarrito = document.getElementById('itemsCarrito');
            const contenedorTotal = document.getElementById('totalCarrito');
            contenedorCarrito.innerHTML = '';
            
            let total = 0;

            if(carrito.length === 0) {
                contenedorCarrito.innerHTML = '<p style="text-align: center; color: #64748B; margin-top: 40px;">Tu match está vacío.</p>';
                contenedorTotal.innerText = '$0.00';
                return;
            }

            carrito.forEach(item => {
                const subtotal = item.Precio * item.cantidad;
                total += subtotal;
                
                contenedorCarrito.innerHTML += `
                    <div class="cart-item">
                        <div>
                            <h4>${item.Titulo}</h4>
                            <p>Cant: ${item.cantidad} x $${item.Precio.toLocaleString('es-AR')}</p>
                        </div>
                        <strong style="color: var(--primary)">$${subtotal.toLocaleString('es-AR')}</strong>
                    </div>
                `;
            });

            contenedorTotal.innerText = '$' + total.toLocaleString('es-AR');
        }

        function finalizarCompra() {
            if(carrito.length === 0) {
                alert("Debes agregar al menos un servicio o producto para hacer Match.");
            } else {
                alert("¡Match procesado con éxito! Tu mascota te lo va a agradecer.");
                carrito = []; // Vaciamos el arreglo
                renderizarCarrito(); // Actualizamos la interfaz
            }
        }

        // 5. FUNCIONES DEL MODAL
        function verDetalle(idBuscado) {
            const oferta = baseDeDatos.find(item => item.ID_Oferta === idBuscado);
            if(oferta) {
                document.getElementById('modalTitulo').innerText = oferta.Titulo;
                document.getElementById('modalTipo').innerText = oferta.Tipo_Oferta;
                document.getElementById('modalEspecie').innerText = oferta.Especie_Destino;
                document.getElementById('modalEnergia').innerText = oferta.Nivel_Energia;
                document.getElementById('modalPrecio').innerText = "$" + oferta.Precio.toLocaleString('es-AR');
                document.getElementById('modalId').innerText = oferta.ID_Oferta;
                
                // Configuramos el botón del modal para que agregue el producto actual
                document.getElementById('btnModalAgregar').setAttribute('onclick', `agregarAlCarrito('${oferta.ID_Oferta}')`);
                
                document.getElementById('modalDetalle').style.display = 'flex';
            }
        }

        function cerrarModal() { 
            document.getElementById('modalDetalle').style.display = 'none'; 
        }

        // Inicialización al cargar la página
        renderizarCatalogo();
        renderizarCarrito();
    </script>
</body>
</html>
